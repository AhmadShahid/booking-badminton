# IMPORTANT: To enable this workflow in GitHub, you MUST add the following secrets to your repository:
# TAKEACTIVE_EMAIL: Your login email.
# TAKEACTIVE_PASSWORD: Your login password.

name: TakeActive Auto-Booking

on:
  schedule:
    # Trigger early to account for GitHub jitter (16:40 UTC is 18:40/17:40 Berlin)
    - cron: '40 16 * * 1,2,3,4,5'
  workflow_dispatch:

jobs:
  book-appointment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Wait for 7 PM Berlin
        run: |
          node -e '
            const wait = () => {
              const now = new Date();
              const formatter = new Intl.DateTimeFormat("en-US", {
                timeZone: "Europe/Berlin",
                year: "numeric", month: "numeric", day: "numeric",
                hour: "numeric", minute: "numeric", second: "numeric", hour12: false
              });
              
              const parts = formatter.formatToParts(now).reduce((acc, part) => {
                acc[part.type] = part.value;
                return acc;
              }, {});
              
              const berlinNow = new Date(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
              const berlinTarget = new Date(berlinNow);
              berlinTarget.setHours(19, 0, 0, 0);
              
              const diffMs = berlinTarget - berlinNow;
              if (diffMs > 0) {
                console.log(`Current Berlin Time: ${berlinNow.toISOString().replace("T", " ")}`);
                console.log(`Target Berlin Time:  ${berlinTarget.toISOString().replace("T", " ")}`);
                console.log(`Waiting ${Math.round(diffMs/1000)} seconds...`);
                setTimeout(() => process.exit(0), diffMs);
              } else {
                console.log("Target time (7 PM Berlin) has already passed or is now. Proceeding immediately.");
                process.exit(0);
              }
            };
            wait();
          '

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Booking Attempt
        env:
          TAKEACTIVE_EMAIL: ${{ secrets.TAKEACTIVE_EMAIL }}
          TAKEACTIVE_PASSWORD: ${{ secrets.TAKEACTIVE_PASSWORD }}
          CI: true
        run: |
          echo "Booking started at (UTC): $(date -u)"

          # Try 3 times with short delays in case of server load at 7 PM
          npm test && exit 0 || echo "Attempt 1 failed, retrying in 10s..."
          sleep 10
          npm test && exit 0 || echo "Attempt 2 failed, retrying in 10s..."
          sleep 10
          npm test && exit 0

          echo "❌ Booking failed after 3 rapid attempts"
          exit 1
