# IMPORTANT: To enable this workflow in GitHub, you MUST add the following secrets to your repository:
# TAKEACTIVE_EMAIL: Your login email.
# TAKEACTIVE_PASSWORD: Your login password.

name: Badminton Auto-Booking

on:
  schedule:
    # Trigger at 16:30 UTC (17:30 CET / 18:30 CEST)
    # This provides a 30-90 min buffer for GitHub jitter and DST.
    - cron: '40 17 * * 1,2,3,4,5'
  workflow_dispatch:

jobs:
  book-appointment:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Precision Booking
        env:
          TAKEACTIVE_EMAIL: ${{ secrets.TAKEACTIVE_EMAIL }}
          TAKEACTIVE_PASSWORD: ${{ secrets.TAKEACTIVE_PASSWORD }}
          SLOTS_TO_BOOK: ${{ secrets.SLOTS_TO_BOOK }}
          CI: true
        run: |
          echo "Booking process triggered at (UTC): $(date -u)"
          npm test
